<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inspo — Cuemath design library</title>
  <meta name="description" content="The Cuemath design team's shared inspiration library." />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='9' fill='%23F4AB52'/%3E%3C/svg%3E" />
  <link rel="stylesheet" href="bundle.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header class="hdr" id="hdr">
    <div class="hdr-row">
      <a class="wordmark" href="#" aria-label="Inspo — home">Inspo<span class="wordmark-dot">.</span></a>

      <div class="search-wrap">
        <svg class="search-glyph" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <circle cx="7" cy="7" r="4.6" stroke="currentColor" stroke-width="1.2"/>
          <path d="M10.5 10.5L14 14" stroke="currentColor" stroke-width="1.2"/>
        </svg>
        <input id="search" class="search" type="search" autocomplete="off" spellcheck="false"
               placeholder="Search a vibe — moody, calm, editorial…" aria-label="Search the library" autofocus />
        <kbd class="search-kbd" aria-hidden="true">/</kbd>
      </div>

      <div class="sort" role="group" aria-label="Sort order">
        <button class="sort-btn is-active" data-sort="recent" type="button" aria-pressed="true">Recent</button>
        <span class="sort-sep" aria-hidden="true"></span>
        <button class="sort-btn" data-sort="loved" type="button" aria-pressed="false">Loved</button>
      </div>
    </div>

    <div class="chips-row" id="chips" role="toolbar" aria-label="Filter by tag"></div>
  </header>

  <main class="stage">
    <div class="masonry" id="grid"></div>
    <div class="empty" id="empty" hidden>
      <p class="empty-msg" id="empty-msg"></p>
    </div>
  </main>

  <div class="detail" id="detail" hidden role="dialog" aria-modal="true" aria-labelledby="detail-title">
    <button class="detail-back" id="detail-back" type="button" aria-label="Back to gallery">
      <svg viewBox="0 0 20 20" fill="none" aria-hidden="true">
        <path d="M12 4l-6 6 6 6" stroke="currentColor" stroke-width="1.4"/>
      </svg>
      Back
    </button>
    <button class="detail-close" id="detail-close" type="button" aria-label="Close">
      <svg viewBox="0 0 20 20" fill="none" aria-hidden="true">
        <path d="M5 5l10 10M15 5L5 15" stroke="currentColor" stroke-width="1.4"/>
      </svg>
    </button>
    <div class="detail-scroll" id="detail-scroll">
      <article class="detail-body" id="detail-body"></article>
      <section class="detail-more" id="detail-more" hidden>
        <p class="detail-more-label">Keep browsing</p>
        <div class="masonry detail-more-grid" id="detail-more-grid"></div>
      </section>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
