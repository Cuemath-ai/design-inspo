name = "inspo-nudge"
main = "src/index.js"
compatibility_date = "2024-09-01"

# Public, non-secret config. The two secrets (SLACK_BOT_TOKEN, SLACK_SIGNING_SECRET)
# are set with `wrangler secret put` and never live in this file or git.
[vars]
INSPO_CHANNEL = "C0BA05V4C7M"

# Safety-net digest: Monday 11:30 UTC = 5:00 PM IST. The Mac sweep normally posts
# it earlier (10 AM–4 PM IST); this only fires if the laptop never got the chance.
[triggers]
crons = ["30 11 * * 1"]
